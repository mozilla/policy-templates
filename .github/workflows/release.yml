name: Release

on:
  push:
    tags:
      - 'v*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install xmlstarlet
        run: sudo apt-get install -y xmlstarlet

      - name: Extract version (strip leading 'v')
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Bump ADMX/ADML revision numbers
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # xmlstarlet ed on ubuntu-latest doesn't accept -N for namespace binding
          # (that's a sel option), so we use local-name() to match elements
          # regardless of the ADMX default namespace.
          xmlstarlet ed -P --inplace --update "/*[local-name()='policyDefinitions']/@revision" -v "$VERSION" windows/firefox.admx
          xmlstarlet ed -P --inplace --update "/*[local-name()='policyDefinitions']/*[local-name()='resources']/@minRequiredRevision" -v "$VERSION" windows/firefox.admx
          for locale in de-DE en-US ru-RU fr-FR; do
            xmlstarlet ed -P --inplace --update "/*[local-name()='policyDefinitionResources']/@revision" -v "$VERSION" "windows/$locale/firefox.adml"
          done

      - name: Regenerate OMA-URIs reference
        run: python3 scripts/generate_oma_uris.py > docs/oma-uris.md

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add windows/firefox.admx windows/de-DE/firefox.adml windows/en-US/firefox.adml windows/ru-RU/firefox.adml windows/fr-FR/firefox.adml docs/oma-uris.md
          git diff --staged --quiet || git commit -m "Bump version to ${{ steps.version.outputs.version }}"
          git push origin HEAD:master

      - name: Create release ZIP
        run: |
          zip -r "policy_templates_${GITHUB_REF_NAME}.zip" docs/ mac/ windows/ linux/ LICENSE

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --draft \
            "policy_templates_${GITHUB_REF_NAME}.zip"
